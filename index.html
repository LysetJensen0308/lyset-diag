<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E3A2F">
<title>親コンディション年齢診断 | Ly:set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════ */
:root{
  --forest: #1A2E1E;
  --green:  #2D6A4F;
  --mint:   #52B788;
  --mintlt: #B7E4C7;
  --cream:  #F8F5EF;
  --parch:  #F0EBE1;
  --rose:   #C4697A;
  --roselt: #FAE8EC;
  --gold:   #B8935A;
  --goldlt: #FBF5E8;
  --ink:    #1C1814;
  --mid:    #6B6158;
  --line:   #DDD7CE;
  --white:  #FFFFFF;
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  background:var(--forest);
  color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 5%,  rgba(82,183,136,.16) 0%,transparent 55%),
    radial-gradient(ellipse 55% 70% at 85% 90%, rgba(196,105,122,.11) 0%,transparent 55%),
    radial-gradient(ellipse 40% 40% at 55% 45%, rgba(184,147,90,.07)  0%,transparent 50%);
  pointer-events:none;
}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.wrap{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:env(safe-area-inset-bottom,32px);
}

/* ══════════════════════════════════
   HEADER BAR
══════════════════════════════════ */
.hdr{
  width:100%;max-width:480px;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 0;
  margin-bottom:0;
}
.logo-img-link{display:flex;align-items:center;text-decoration:none}
.logo-img{height:36px;width:auto;object-fit:contain;filter:brightness(0) invert(1)}
.ev-badge{
  font-size:9.5px;letter-spacing:.1em;
  color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.18);
  padding:3px 10px;
}

/* ══════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════ */
.scr{
  width:100%;max-width:480px;
  padding:0 20px;
  display:none;
  animation:fsup .42s cubic-bezier(.16,1,.3,1) both;
}
.scr.on{display:block}
@keyframes fsup{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════
   SCREEN 0 — INTRO
══════════════════════════════════ */
#s0{padding-top:20px}
.s0-tag{
  display:inline-block;
  font-size:9.5px;letter-spacing:.2em;
  color:var(--mint);border:1px solid var(--mint);
  padding:4px 13px;margin-bottom:18px;
}
.s0-ttl{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(25px,7vw,34px);
  font-weight:400;line-height:1.5;letter-spacing:.05em;
  color:var(--white);margin-bottom:10px;
}
.s0-ttl .ac{color:var(--mint)}
.s0-sub{
  font-size:13px;color:rgba(255,255,255,.62);
  line-height:1.9;margin-bottom:24px;
}
.s0-stats{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r);
  padding:18px 20px;margin-bottom:24px;
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
}
.stat-item{text-align:center}
.stat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:300;color:var(--mint);line-height:1;margin-bottom:4px;
}
.stat-l{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.5)}
.start-btn{
  width:100%;padding:17px;
  background:var(--mint);color:var(--forest);
  border:none;border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.start-btn:active{background:#3EA070;transform:translateY(-1px)}
.s0-note{
  text-align:center;font-size:11px;
  color:rgba(255,255,255,.35);
  margin-top:13px;letter-spacing:.06em;
}

/* ══════════════════════════════════
   SCREEN: 実年齢入力
══════════════════════════════════ */
#sAge{padding-top:24px}
.age-card{
  background:var(--cream);border-radius:var(--r);
  overflow:hidden;margin-bottom:16px;
}
.age-card-top{
  background:var(--green);
  padding:20px 22px 18px;
}
.age-card-ttl{
  font-family:'Noto Serif JP',serif;
  font-size:17px;font-weight:400;line-height:1.6;
  color:var(--white);letter-spacing:.04em;margin-bottom:6px;
}
.age-card-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.7}
.age-input-wrap{
  padding:22px 22px 24px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.age-input-row{display:flex;align-items:center;gap:10px}
.age-input{
  width:96px;text-align:center;
  background:var(--white);
  border:2px solid var(--line);border-radius:var(--r);
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:300;color:var(--ink);
  padding:8px 10px;
  -webkit-appearance:none;
}
.age-input:focus{outline:none;border-color:var(--mint)}
.age-unit-lbl{font-size:16px;color:var(--mid);letter-spacing:.06em}
.age-note{font-size:11px;color:var(--mid);letter-spacing:.06em}
.age-next{
  width:100%;padding:15px;
  background:var(--forest);color:var(--mintlt);
  border:2px solid var(--mint);border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:500;letter-spacing:.12em;
  cursor:pointer;transition:all .2s;
  opacity:.35;pointer-events:none;
  -webkit-tap-highlight-color:transparent;
}
.age-next.on{opacity:1;pointer-events:all}
.age-next.on:active{background:var(--green)}

/* ══════════════════════════════════
   SCREEN: 質問
══════════════════════════════════ */
#sQ{padding-top:0}
.q-hdr{padding:20px 0 16px}
.prog-wrap{
  background:rgba(255,255,255,.12);border-radius:99px;
  height:4px;margin-bottom:9px;overflow:hidden;
}
.prog-fill{
  height:100%;background:var(--mint);border-radius:99px;
  transition:width .4s cubic-bezier(.16,1,.3,1);
}
.prog-row{display:flex;justify-content:space-between;align-items:center}
.prog-step{font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.5)}
.prog-theme{font-size:11px;letter-spacing:.08em;color:var(--mint)}

.q-card{
  background:var(--cream);border-radius:var(--r);
  overflow:hidden;margin-bottom:14px;
}
.q-card-top{background:var(--green);padding:18px 20px 16px}
.q-num{
  font-family:'Cormorant Garamond',serif;
  font-size:11px;letter-spacing:.2em;color:var(--mintlt);
  margin-bottom:7px;display:block;
}
.q-txt{
  font-family:'Noto Serif JP',serif;
  font-size:16px;font-weight:400;line-height:1.65;
  color:var(--white);letter-spacing:.04em;
}
.q-hint{font-size:11px;color:rgba(255,255,255,.55);margin-top:5px;line-height:1.7}

.choices{padding:12px 14px 16px;display:flex;flex-direction:column;gap:9px}
.ch-btn{
  width:100%;text-align:left;
  background:var(--white);border:2px solid var(--line);
  border-radius:var(--r);padding:12px 14px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:13.5px;font-weight:300;color:var(--ink);
  cursor:pointer;transition:all .17s;
  display:flex;align-items:flex-start;gap:9px;
  -webkit-tap-highlight-color:transparent;line-height:1.55;
}
.ch-btn:active{border-color:var(--mint);background:var(--parch)}
.ch-btn.sel{background:var(--forest);border-color:var(--mint);color:var(--white)}
.ch-btn.sel .ch-dot{background:var(--mint);border-color:var(--mint);color:var(--forest)}
.ch-dot{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:var(--mid);
  margin-top:1px;transition:all .17s;
}

.btn-row{display:flex;gap:10px;align-items:stretch}
.back-btn{
  flex-shrink:0;width:52px;padding:15px 0;
  background:transparent;color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.18);border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:18px;font-weight:300;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;
}
.back-btn:active{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.45)}
.back-btn.hidden{visibility:hidden;pointer-events:none}
.next-btn{
  flex:1;padding:15px;
  background:var(--forest);color:var(--mintlt);
  border:2px solid var(--mint);border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:500;letter-spacing:.12em;
  cursor:pointer;transition:all .2s;
  opacity:.33;pointer-events:none;
  -webkit-tap-highlight-color:transparent;
}
.next-btn.on{opacity:1;pointer-events:all}
.next-btn.on:active{background:var(--green)}

/* ══════════════════════════════════
   SCREEN: LOADING
══════════════════════════════════ */
#sLoad{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:72vh;text-align:center;
}
#sLoad.on{display:flex}
.ring{
  width:70px;height:70px;
  border:3px solid rgba(82,183,136,.2);
  border-top-color:var(--mint);
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:22px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-ttl{font-family:'Noto Serif JP',serif;font-size:15px;color:var(--mintlt);letter-spacing:.08em;margin-bottom:7px}
.load-sub{font-size:11.5px;color:rgba(255,255,255,.4);letter-spacing:.06em}

/* ══════════════════════════════════
   SCREEN: RESULT
══════════════════════════════════ */
#sRes{padding-top:10px}

.res-top{text-align:center;padding:28px 0 20px}
.res-eyebrow{font-size:10px;letter-spacing:.22em;color:var(--mint);margin-bottom:12px;display:block}

/* 年齢リング */
.ring-wrap{position:relative;width:156px;height:156px;margin:0 auto 12px}
.ring-svg{width:156px;height:156px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:9}
.ring-arc{
  fill:none;stroke:var(--mint);stroke-width:9;
  stroke-linecap:round;
  stroke-dasharray:428;stroke-dashoffset:428;
  transition:stroke-dashoffset 1.7s cubic-bezier(.16,1,.3,1) .25s;
}
.ring-arc.warn{stroke:var(--gold)}
.ring-arc.alert{stroke:var(--rose)}
.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-age{
  font-family:'Cormorant Garamond',serif;
  font-size:58px;font-weight:300;line-height:1;color:var(--white);
  opacity:0;transform:scale(.82);
  transition:all .55s cubic-bezier(.16,1,.3,1) 1s;
}
.ring-age.show{opacity:1;transform:scale(1)}
.ring-unit{font-size:13px;letter-spacing:.1em;color:rgba(255,255,255,.55)}

.diff-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 15px;border-radius:99px;
  font-size:12px;letter-spacing:.06em;font-weight:500;
  margin-bottom:12px;
}
.diff-pill.good {background:rgba(82,183,136,.15);color:var(--mint);border:1px solid var(--mint)}
.diff-pill.warn {background:rgba(184,147,90,.15);color:var(--gold);border:1px solid var(--gold)}
.diff-pill.alert{background:rgba(196,105,122,.15);color:var(--rose);border:1px solid var(--rose)}

.res-type{font-size:14px;color:rgba(255,255,255,.7);letter-spacing:.04em}

/* スコア内訳 */
.sec-lbl{
  font-size:10px;letter-spacing:.22em;color:var(--mint);
  margin:24px 0 11px;
}
.score-list{display:flex;flex-direction:column;gap:11px;margin-bottom:6px}
.score-row{}
.score-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.score-cat{font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.06em}
.score-pts{font-size:12px;font-weight:500}
.score-track{height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.score-bar{height:100%;border-radius:99px;width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.c-good {background:var(--mint)}
.c-warn {background:var(--gold)}
.c-alert{background:var(--rose)}

/* 整える順番カード */
.order-card{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r);
  overflow:hidden;
  margin:24px 0 0;
}
.order-head{
  background:var(--green);
  padding:14px 18px;
}
.order-head-ttl{
  font-family:'Noto Serif JP',serif;
  font-size:15px;font-weight:400;color:var(--white);
  letter-spacing:.05em;margin-bottom:3px;
}
.order-head-sub{font-size:11px;color:rgba(255,255,255,.6);line-height:1.7}
.order-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px}

.prod-step{display:flex;gap:12px;align-items:flex-start}
.prod-step-num{
  flex-shrink:0;
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:300;color:var(--forest);
  margin-top:2px;
}
.step1-num{background:var(--mint)}
.step2-num{background:var(--gold)}
.prod-content{}
.prod-name{
  font-size:13.5px;font-weight:500;color:var(--white);
  margin-bottom:3px;line-height:1.5;
}
.prod-role{
  font-size:11px;color:rgba(255,255,255,.55);line-height:1.75;
  margin-bottom:6px;
}
.prod-tags{display:flex;flex-wrap:wrap;gap:5px}
.prod-tag{
  font-size:10px;letter-spacing:.07em;
  color:rgba(255,255,255,.65);
  background:rgba(255,255,255,.08);
  padding:2px 9px;border-radius:99px;
}

.divider{height:1px;background:rgba(255,255,255,.1);margin:4px 0}

/* CTA ブロック */
.cta-block{
  background:var(--cream);border-radius:var(--r);
  overflow:hidden;margin-top:20px;margin-bottom:12px;
}
.cta-top{background:var(--green);padding:16px 18px}
.cta-top-eyebrow{font-size:9.5px;letter-spacing:.2em;color:var(--mintlt);margin-bottom:6px}
.cta-top-ttl{
  font-family:'Noto Serif JP',serif;
  font-size:15px;font-weight:400;line-height:1.6;
  color:var(--white);letter-spacing:.04em;
}
.cta-body{padding:16px 18px 20px}
.cta-body p{font-size:12.5px;color:var(--mid);line-height:1.8;margin-bottom:14px}
.cta-primary{
  display:block;width:100%;padding:15px;
  background:var(--mint);color:var(--forest);
  border:none;border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.1em;
  text-align:center;text-decoration:none;
  cursor:pointer;transition:all .2s;margin-bottom:10px;
  -webkit-tap-highlight-color:transparent;
}
.cta-primary:active{background:#3EA070}
.cta-secondary{
  display:block;width:100%;padding:12px;
  background:transparent;color:var(--green);
  border:2px solid var(--green);border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:12.5px;font-weight:500;letter-spacing:.1em;
  text-align:center;text-decoration:none;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.cta-secondary:active{background:var(--parch)}

/* 誘導トーク吹き出し */
.balloon{
  background:var(--goldlt);
  border:1px solid #D4B07A;
  border-radius:var(--r);
  padding:14px 16px;
  margin:14px 0 6px;
  font-size:13px;line-height:1.85;color:var(--ink);
  position:relative;
}
.balloon::before{
  content:'💬';
  font-size:16px;
  display:block;margin-bottom:6px;
}

.retry-btn{
  width:100%;padding:11px;
  background:transparent;color:rgba(255,255,255,.4);
  border:1px solid rgba(255,255,255,.14);
  border-radius:var(--r);
  font-family:'Noto Sans JP',sans-serif;
  font-size:12px;letter-spacing:.1em;
  cursor:pointer;margin-top:6px;margin-bottom:24px;
  -webkit-tap-highlight-color:transparent;
}
.retry-btn:active{color:rgba(255,255,255,.75)}
</style>
</head>

    </div>
    <button class="start-btn" onclick="goAge()">診断スタート ▶</button>
    <p class="s0-note">個人情報は収集しません</p>
  </div>

  <!-- ════════════════════════
       sAge: 実年齢入力
  ════════════════════════ -->
  <div class="scr" id="sAge">
    <div class="age-card">
      <div class="age-card-top">
        <div class="age-card-ttl">まず、あなたの実年齢を<br>教えてください</div>
        <div class="age-card-sub">診断結果の「コンディション年齢」算出に使用します。</div>
      </div>
      <div class="age-input-wrap">
        <div class="age-input-row">
          <input class="age-input" type="number" id="ageVal" min="18" max="80"
            placeholder="32" inputmode="numeric"
            oninput="onAgeInput(this)">
          <span class="age-unit-lbl">歳</span>
        </div>
        <span class="age-note">18〜80歳の範囲で入力してください</span>
      </div>
    </div>
    <button class="age-next" id="ageNext" onclick="startQ()">次へ　→</button>
  </div>

  <!-- ════════════════════════
       sQ: 質問
  ════════════════════════ -->
  <div class="scr" id="sQ">
    <div class="q-hdr">
      <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-row">
        <span class="prog-step" id="progStep"></span>
        <span class="prog-theme" id="progTheme"></span>
      </div>
    </div>
    <div class="q-card">
      <div class="q-card-top">
        <span class="q-num" id="qNum"></span>
        <div class="q-txt" id="qTxt"></div>
        <div class="q-hint" id="qHint"></div>
      </div>
      <div class="choices" id="choices"></div>
    </div>
    <div class="btn-row">
      <button class="back-btn hidden" id="backBtn" onclick="doBack()">←</button>
      <button class="next-btn" id="nextBtn" onclick="doNext()">次へ　→</button>
    </div>
  </div>

  <!-- ════════════════════════
       sLoad: ローディング
  ════════════════════════ -->
  <div class="scr" id="sLoad">
    <div class="ring"></div>
    <div class="load-ttl">診断中…</div>
    <div class="load-sub">あなたのコンディションを分析しています</div>
  </div>

  <!-- ════════════════════════
       sRes: 結果（JS生成）
  ════════════════════════ -->
  <div class="scr" id="sRes"></div>

</div><!-- /wrap -->

<script>
/* ══════════════════════
   質問データ
   各選択肢に「加点ポイント」を設定
   腸：各問最大10点 × 4問 = 40点
   睡眠：各問最大10点 × 3問 = 30点
   メンタル：各問最大10点 × 3問 = 30点
   合計100点満点
══════════════════════ */
const QS = [
  // ── 腸 (40点) ──────────────────
  {
    cat:'腸',
    max:10,
    txt:'朝、トイレでスッキリする日が多いですか？',
    hint:'排便の快適さは腸の健康状態を示す最もわかりやすいサインです。',
    choices:[
      {label:'ほぼ毎日スッキリする',     pt:10},
      {label:'週4〜5日はスッキリする',   pt:7},
      {label:'週2〜3日程度',            pt:4},
      {label:'ほとんどスッキリしない',   pt:0},
    ]
  },
  {
    cat:'腸',
    max:10,
    txt:'便のリズム（毎日ほぼ同じ時間帯）は安定していますか？',
    hint:'腸のリズムが安定していると、自律神経・免疫・ホルモン分泌も整いやすくなります。',
    choices:[
      {label:'安定している',                   pt:10},
      {label:'だいたい安定している',           pt:7},
      {label:'バラバラなことが多い',           pt:3},
      {label:'2〜3日に1回以下・不安定',       pt:0},
    ]
  },
  {
    cat:'腸',
    max:10,
    txt:'食後や日中、お腹の張り・ガス・不快感を感じることはありますか？',
    hint:'',
    choices:[
      {label:'ほとんど感じない',             pt:10},
      {label:'たまに感じる程度',             pt:7},
      {label:'週に数回気になる',             pt:3},
      {label:'ほぼ毎日・慢性的に感じる',    pt:0},
    ]
  },
  {
    cat:'腸',
    max:10,
    txt:'野菜・海藻・豆類などの食物繊維を意識して食べていますか？',
    hint:'食物繊維は腸内善玉菌のエサになり、腸内環境の多様性を保ちます。',
    choices:[
      {label:'毎食意識している',           pt:10},
      {label:'1日1〜2食は意識している',    pt:7},
      {label:'あまり意識していない',        pt:3},
      {label:'ほとんど食べていない',        pt:0},
    ]
  },
  // ── 睡眠 (30点) ─────────────────
  {
    cat:'睡眠',
    max:10,
    txt:'夜、ぐっすり眠れていますか？（途中で目が覚めず、深く眠れている感覚）',
    hint:'睡眠の「質」は時間と同じくらい重要です。',
    choices:[
      {label:'いつもぐっすり眠れている',     pt:10},
      {label:'だいたい眠れている',          pt:7},
      {label:'途中で目が覚めることが多い',  pt:3},
      {label:'眠れない・浅い眠りが続く',    pt:0},
    ]
  },
  {
    cat:'睡眠',
    max:10,
    txt:'朝、スムーズに起きられますか？',
    hint:'目覚めの良さは、睡眠の質と体内時計のリズムが整っているサインです。',
    choices:[
      {label:'スッと起きられる',                   pt:10},
      {label:'少し時間がかかるが起きられる',       pt:7},
      {label:'かなりつらいが何とか起きる',         pt:3},
      {label:'起きるのが毎日とてもつらい',         pt:0},
    ]
  },
  {
    cat:'睡眠',
    max:10,
    txt:'日中（特に午後）に強い眠気を感じることはありますか？',
    hint:'日中の過度な眠気は夜間の睡眠不足・血糖値乱高下のサインです。',
    choices:[
      {label:'ほとんど感じない',           pt:10},
      {label:'たまに感じる程度',           pt:7},
      {label:'週に数回強い眠気がある',     pt:3},
      {label:'毎日強い眠気がある',         pt:0},
    ]
  },
  // ── メンタル (30点) ──────────────
  {
    cat:'メンタル',
    max:10,
    txt:'嫌なことや落ち込んだとき、気持ちを早く切り替えられますか？',
    hint:'切り替えの早さは、自律神経の柔軟性（レジリエンス）を反映します。',
    choices:[
      {label:'わりとすぐ切り替えられる',             pt:10},
      {label:'少し時間がかかるが切り替えられる',     pt:7},
      {label:'なかなか切り替えられずひきずる',       pt:3},
      {label:'長く落ち込む・引きずることが多い',     pt:0},
    ]
  },
  {
    cat:'メンタル',
    max:10,
    txt:'週に数回、「5分でも自分だけの時間」を持てていますか？',
    hint:'副交感神経を切り替えるための「ひとりの時間」は、ホルモンバランスにも直結します。',
    choices:[
      {label:'毎日持てている',               pt:10},
      {label:'週に3〜4回は持てている',       pt:7},
      {label:'週1〜2回程度',                pt:3},
      {label:'ほぼ持てていない',             pt:0},
    ]
  },
  {
    cat:'メンタル',
    max:10,
    txt:'悩みや不安を「安心して話せる人」があなたの周りにいますか？',
    hint:'人とのつながりはオキシトシン分泌を促し、ストレスホルモンを低下させます。',
    choices:[
      {label:'はい、いる',                  pt:10},
      {label:'なんとなくいる気はする',      pt:7},
      {label:'あまりいない',                pt:3},
      {label:'いない・一人で抱えている',    pt:0},
    ]
  },
];

/* カテゴリ別最大点 */
const CAT_MAX = { '腸':40, '睡眠':30, 'メンタル':30 };

/* 状態 */
let realAge = 0;
let curQ = 0;
let ans = new Array(QS.length).fill(null);
let selIdx = null;

/* ── 画面切替 ── */
function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  const el = document.getElementById(id);
  el.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── S0→実年齢入力 ── */
function goAge(){ show('sAge'); }

/* ── 年齢インプット ── */
function onAgeInput(el){
  const v = parseInt(el.value,10);
  const btn = document.getElementById('ageNext');
  if(v>=18 && v<=80){ realAge=v; btn.classList.add('on'); }
  else              { realAge=0; btn.classList.remove('on'); }
}

/* ── 年齢入力→質問スタート ── */
function startQ(){
  if(!realAge) return;
  curQ=0; ans.fill(null);
  renderQ(0);
  show('sQ');
}

/* ── 質問描画 ── */
function renderQ(i){
  const q=QS[i]; selIdx=null;
  const pct = Math.round((i/QS.length)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progStep').textContent=`Q${i+1} / ${QS.length}`;
  document.getElementById('progTheme').textContent=q.cat;
  document.getElementById('qNum').textContent=`Question ${String(i+1).padStart(2,'0')}`;
  document.getElementById('qTxt').textContent=q.txt;
  document.getElementById('qHint').textContent=q.hint||'';

  const labels=['A','B','C','D'];
  document.getElementById('choices').innerHTML=
    q.choices.map((c,j)=>`
      <button class="ch-btn" onclick="selCh(${j})">
        <span class="ch-dot">${labels[j]}</span>
        <span>${c.label}</span>
      </button>`).join('');

  // 戻ってきた場合、前の回答を復元
  const prevPt = ans[i];
  if(prevPt !== null){
    const prevIdx = QS[i].choices.findIndex(c=>c.pt===prevPt);
    if(prevIdx>=0){
      selIdx = prevIdx;
      document.querySelectorAll('.ch-btn')[prevIdx].classList.add('sel');
      const dot = document.querySelectorAll('.ch-btn')[prevIdx].querySelector('.ch-dot');
      dot.style.background='var(--mint)';dot.style.borderColor='var(--mint)';dot.style.color='var(--forest)';
    }
  }

  const nb=document.getElementById('nextBtn');
  nb.classList.toggle('on', selIdx!==null);
  nb.textContent = i===QS.length-1 ? '診断結果を見る ▶' : '次へ　→';

  // 戻るボタン：Q1のみ非表示
  const bb=document.getElementById('backBtn');
  if(i===0){ bb.classList.add('hidden'); } else { bb.classList.remove('hidden'); }
}

function selCh(j){
  selIdx=j;
  document.querySelectorAll('.ch-btn').forEach((b,k)=>{
    b.classList.toggle('sel',k===j);
    const dot=b.querySelector('.ch-dot');
    if(k===j){ dot.style.background='var(--mint)';dot.style.borderColor='var(--mint)';dot.style.color='var(--forest)'; }
    else { dot.style.background='';dot.style.borderColor='';dot.style.color=''; }
  });
  document.getElementById('nextBtn').classList.add('on');
}

function doNext(){
  if(selIdx===null) return;
  ans[curQ]=QS[curQ].choices[selIdx].pt;
  if(curQ<QS.length-1){ curQ++; renderQ(curQ); window.scrollTo({top:0,behavior:'smooth'}); }
  else { show('sLoad'); setTimeout(buildResult,1800); }
}

function doBack(){
  if(curQ<=0) return;
  // 現在の選択を一時保存してから戻る（回答はすでにans配列に入っているのでそのまま）
  curQ--;
  renderQ(curQ);
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══════════════════════
   結果計算
══════════════════════ */
function buildResult(){
  /* カテゴリ別合計 */
  const catPts = {'腸':0,'睡眠':0,'メンタル':0};
  QS.forEach((q,i)=>{ catPts[q.cat]+=ans[i]; });

  const total = Object.values(catPts).reduce((s,v)=>s+v,0); // 0〜100

  /* 年齢計算式（修正版）: 推定年齢 = 実年齢 + ((60 - 合計点) ÷ 5)  ±8歳以内
     合計0点(最低)  → +12 → ±8制限で +8歳
     合計60点(基準) → ±0歳
     合計100点(最高)→ -8歳（フルレンジ）*/
  let rawDiff = (60 - total) / 5;
  rawDiff = Math.max(-8, Math.min(8, rawDiff));
  const condAge = Math.round(realAge + rawDiff);

  /* カテゴリ達成率 */
  const catPct = {};
  for(const [c,v] of Object.entries(catPts)) catPct[c]=Math.round(v/CAT_MAX[c]*100);

  /* タイプ判定 */
  const diff = condAge - realAge;
  let type, diffLabel, diffCls;
  if(diff <= -3){
    type='若々しいコンディション'; diffLabel=`実年齢より ${Math.abs(diff)}歳 若い`; diffCls='good';
  } else if(diff <= 2){
    type='コンディション維持タイプ'; diffLabel=`実年齢とほぼ同じ`; diffCls='warn';
  } else {
    type='リカバリーが必要タイプ'; diffLabel=`実年齢より ${diff}歳 上回る`; diffCls='alert';
  }

  /* 弱いカテゴリTop2（アドバイス用） */
  const weak = Object.entries(catPct).sort(([,a],[,b])=>a-b).slice(0,2).map(([c])=>c);

  /* リング */
  const ringPct = Math.min(1, Math.max(0, (total/100)));

  /* HTML組み立て */
  const html=`
    <div class="res-top">
      <span class="res-eyebrow">DIAGNOSIS RESULT</span>

      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 156 156">
          <circle class="ring-bg" cx="78" cy="78" r="68"/>
          <circle class="ring-arc ${diffCls}" id="ringArc" cx="78" cy="78" r="68"/>
        </svg>
        <div class="ring-center">
          <div class="ring-age" id="ageDisp">${condAge}</div>
          <div class="ring-unit">歳</div>
        </div>
      </div>

      <span class="diff-pill ${diffCls}">${diffLabel}</span>
      <div class="res-type">「${type}」</div>
    </div>

    <p style="font-size:14px;color:rgba(255,255,255,.82);line-height:1.85;margin-bottom:6px">
      あなたの親コンディション年齢は<strong style="color:#fff;font-size:16px">${condAge}歳</strong>です。
    </p>
    <p style="font-size:12.5px;color:rgba(255,255,255,.55);line-height:1.8;margin-bottom:0">
      ${getDiffComment(diff)}
    </p>

    <div class="sec-lbl">スコア内訳（100点満点）</div>
    <div class="score-list">
      ${Object.entries(catPts).map(([cat,pts])=>{
        const max=CAT_MAX[cat];
        const pct=catPct[cat];
        const cls=pct>=70?'c-good':pct>=45?'c-warn':'c-alert';
        const col=pct>=70?'var(--mint)':pct>=45?'var(--gold)':'var(--rose)';
        return `
        <div class="score-row">
          <div class="score-meta">
            <span class="score-cat">${cat}</span>
            <span class="score-pts" style="color:${col}">${pts} / ${max}点</span>
          </div>
          <div class="score-track">
            <div class="score-bar ${cls}" data-w="${pct}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- 整える順番 -->
    <div class="order-card">
      <div class="order-head">
        <div class="order-head-ttl">整える順番が大事です</div>
        <div class="order-head-sub">今日お渡しした2つのアイテム、実は使う順番があります。</div>
      </div>
      <div class="order-body">

        <div class="prod-step">
          <div class="prod-step-num step1-num">1</div>
          <div class="prod-content">
            <div class="prod-name">STEP 1　巡り ── スムーズフリー</div>
            <div class="prod-role">
              善玉菌類やそのエサになる成分を腸のことを考えてバランスよく配合した腸内クレンズ。特殊な処方バランスで一気に腸内を整えます。
            </div>
            <div class="prod-tags">
              <span class="prod-tag">着色料不使用</span>
              <span class="prod-tag">科学調味料不使用</span>
              <span class="prod-tag">人工甘味料不使用</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="prod-step">
          <div class="prod-step-num step2-num">2</div>
          <div class="prod-content">
            <div class="prod-name">STEP 2　吸収 ── 生酵素</div>
            <div class="prod-role">
              腸内クレンズ後、111種類の天然素材をじっくり発酵熟成した活きた酵素で内面美容をサポート。女性に嬉しいヨモギ濃縮エキス＋厳選ハーブ配合。
            </div>
            <div class="prod-tags">
              <span class="prod-tag">エステサロン発</span>
              <span class="prod-tag">生酵素にこだわり</span>
              <span class="prod-tag">ヨモギ配合</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 誘導トーク -->
    <div class="balloon">
      「詳しい使い方やおすすめの飲み方は<br>LINEでまとめています。」<br><br>
      「イベント参加者限定で<strong>割引</strong>もついています。」
    </div>

    <!-- CTA -->
    <div class="cta-block">
      <div class="cta-top">
        <div class="cta-top-eyebrow">NEXT STEP</div>
        <div class="cta-top-ttl">LINEでサンプルの使い方＋<br>イベント限定クーポンを受け取る</div>
      </div>
      <div class="cta-body">
        <p>飲む順番・タイミング・おすすめの飲み方をLINEでまとめています。登録後すぐに確認できます。<br>イベント参加者限定の割引クーポンもLINEから取得できます。</p>
        <a href="https://line.me/R/ti/p/@130lbjna" class="cta-primary">
          📲 LINEで使い方＋クーポンを受け取る
        </a>
        <a href="https://www.instagram.com/lysetjensen/" class="cta-secondary">
          @lysetjensen をフォローして毎日の体ケア情報を受け取る
        </a>
      </div>
    </div>

    <button class="retry-btn" onclick="retry()">↩ もう一度診断する</button>
  `;

  const el=document.getElementById('sRes');
  el.innerHTML=html;
  show('sRes');

  /* アニメーション */
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      // リング描画（周長≈427）
      const offset = 427 - (427 * ringPct);
      const arc=document.getElementById('ringArc');
      if(arc) arc.style.strokeDashoffset=offset;

      // 年齢数字
      const ad=document.getElementById('ageDisp');
      if(ad) ad.classList.add('show');

      // バー
      document.querySelectorAll('.score-bar[data-w]').forEach((b,i)=>{
        setTimeout(()=>{ b.style.width=b.dataset.w+'%'; },i*120);
      });
    },120);
  });
}

function getDiffComment(diff){
  if(diff<=-4) return '腸・睡眠・メンタルすべてがしっかり整っています。この状態を維持するために、今の習慣を続けてください。';
  if(diff<=-1) return '概ね良好な状態ですが、特定のカテゴリにほころびが見え始めています。今のうちに土台を整えておくと、5年後が大きく変わります。';
  if(diff<=3)  return '自覚症状は少なくても、腸・睡眠・メンタルのどこかに消耗が蓄積し始めているサインです。整える順番を意識して、今週から始めてみましょう。';
  return '腸・睡眠・メンタルが連動して消耗しています。まず「腸を整える」ことから始めると、睡眠とメンタルも連鎖的に改善されやすくなります。';
}

function retry(){
  curQ=0; ans.fill(null);
  realAge=0;
  document.getElementById('ageVal').value='';
  document.getElementById('ageNext').classList.remove('on');
  show('s0');
}
</script>

</body>
</html>
